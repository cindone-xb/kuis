<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Olimpiade Matematika Dunia</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:750px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#7c3aed;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#9333ea;
}

.option{
display:block;
margin:10px;
padding:12px;
background:#334155;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:#475569;
}

#timer{
font-size:20px;
margin-bottom:15px;
}

.progress{
width:100%;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:12px;
background:#7c3aed;
width:0%;
}

.leaderboard{
margin-top:25px;
background:#0f172a;
padding:15px;
border-radius:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Olimpiade Matematika Dunia</h1>
<p>Tingkat Kesulitan: IMO Level</p>

<div id="start">

<input id="name" placeholder="Masukkan nama kamu"><br>

<button onclick="startQuiz()">Mulai Tantangan</button>

</div>

<div id="quiz" style="display:none">

<div id="timer"></div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

<div id="result"></div>

<div class="leaderboard">

<h3>🏆 Top 10 Skor</h3>

<ol id="leaderboard"></ol>

</div>

</div>

<script>

const correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
const wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg")

let questions=[

{q:"2+2=?",options:["3","4","5","6"],answer:1},

{q:"12²=?",options:["124","144","132","142"],answer:1},

{q:"√81=?",options:["7","8","9","10"],answer:2},

{q:"10×5=?",options:["40","45","50","55"],answer:2},

{q:"15+27=?",options:["42","41","44","43"],answer:0}

]

let current=0
let score=0
let time=5400
let player=""

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[array[i],array[j]]=[array[j],array[i]]
}
}

shuffle(questions)

function startQuiz(){

player=document.getElementById("name").value

if(player==""){
alert("Masukkan nama dulu")
return
}

document.getElementById("start").style.display="none"
document.getElementById("quiz").style.display="block"

loadQuestion()
timer()

}

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=q.q

let html=""

q.options.forEach((opt,i)=>{

html+=`<div class="option" onclick="selectAnswer(${i})">${opt}</div>`

})

document.getElementById("options").innerHTML=html

updateProgress()

}

function selectAnswer(i){

let q=questions[current]

if(i===q.answer){

score++
correctSound.play()

}else{

wrongSound.play()

}

}

function nextQuestion(){

current++

if(current<questions.length){

loadQuestion()

}else{

endQuiz()

}

}

function updateProgress(){

let percent=(current/questions.length)*100

document.getElementById("progress").style.width=percent+"%"

}

function timer(){

setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=`Waktu: ${m}:${s}`

if(time<=0){

endQuiz()

}

},1000)

}

function endQuiz(){

document.getElementById("quiz").style.display="none"

let percent=Math.floor(score/questions.length*100)

let text=`<h2>${player}</h2>Skor kamu: ${score}/${questions.length}`

if(percent>=80){

text+=`<h3>🎓 Kamu mendapatkan Sertifikat!</h3>`

}

text+=`<br><button onclick="location.reload()">Main Lagi</button>`

document.getElementById("result").innerHTML=text

saveScore(player,percent)

showLeaderboard()

}

function saveScore(name,score){

let scores=JSON.parse(localStorage.getItem("scores"))||[]

scores.push({name,score})

scores.sort((a,b)=>b.score-a.score)

scores=scores.slice(0,10)

localStorage.setItem("scores",JSON.stringify(scores))

}

function showLeaderboard(){

let scores=JSON.parse(localStorage.getItem("scores"))||[]

let html=""

scores.forEach(s=>{

html+=`<li>${s.name} - ${s.score}</li>`

})

document.getElementById("leaderboard").innerHTML=html

}

showLeaderboard()

</script>

</body>
</html>
